<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Habit / Task Tracker</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <main class="app">
    <h1>Habit / Task Tracker</h1>

    <form class="task-form">
      <input
        type="text"
        class="task-input"
        placeholder="Новая задача или привычка..."
        required
      >
      <button type="submit">Добавить</button>
    </form>

    <ul class="task-list">
      <!-- сюда будем добавлять задачи через JS -->
    </ul>
  </main>

  <script src="scripts/script.js"></script>
</body>
</html>
